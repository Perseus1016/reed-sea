<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐰 芦苇海 · 我的记录</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #fefcf7;
    --card: #fffdf8;
    --surface: #faf4e8;
    --text: #4a3f32;
    --text2: #8b7b68;
    --text3: #c4b8a7;
    --pink: #f0a5b5;
    --peach: #f5c1a1;
    --lilac: #c7b3e5;
    --mint: #a8d8c8;
    --sky: #a3c6e8;
    --butter: #f5e2a9;
    --accent: #e8a87c;
    --accent2: #f0c9a0;
    --shadow: 0 2px 12px rgba(80,50,30,0.05);
    --shadow-hover: 0 6px 24px rgba(80,50,30,0.10);
    --radius: 18px;
    --radius-sm: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
  }

  .dark {
    --bg: #1e1b18;
    --card: #28231d;
    --surface: #322b24;
    --text: #d4c8b8;
    --text2: #9a8b78;
    --text3: #6b5f50;
    --accent: #d4a878;
    --accent2: #c09060;
    --shadow: 0 2px 12px rgba(0,0,0,0.2);
    --shadow-hover: 0 6px 24px rgba(0,0,0,0.35);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    -webkit-tap-highlight-color: transparent;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(240,165,181,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 60%, rgba(168,216,200,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(245,226,169,0.06) 0%, transparent 50%);
  }
  .dark body { background-image: none; }

  /* ── Layout container ── */
  .app {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo .mascot {
    font-size: 32px;
    animation: bounce 2s infinite;
    display: inline-block;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
    50% { transform: translateY(0); }
    70% { transform: translateY(-3px); }
  }
  .logo h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.02em;
    background: linear-gradient(135deg, var(--peach), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-actions { display:flex; gap:6px; align-items:center; }
  .hbtn {
    width: 38px; height: 38px; border-radius: 50%;
    border: none; background: var(--surface);
    color: var(--text2); font-size: 17px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .hbtn:hover { background: var(--accent2); color: #fff; transform: scale(1.08); }
  .hbtn:active { transform: scale(0.93); }

  /* ── Navigation tabs (top bar on desktop) ── */
  nav {
    display: flex;
    background: var(--surface);
    border-radius: var(--radius);
    margin: 0 24px 16px;
    padding: 4px;
    gap: 2px;
    flex-shrink: 0;
    box-shadow: var(--shadow);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .nav-item {
    flex: 1; min-width: 70px;
    text-align: center;
    padding: 10px 8px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    border: none; background: transparent;
    color: var(--text3); font-family: var(--font);
    border-radius: 14px;
    white-space: nowrap;
  }
  .nav-item:hover { color: var(--text2); background: rgba(0,0,0,0.03); }
  .nav-item.active {
    color: var(--accent);
    background: var(--card);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    font-weight: 600;
  }
  .nav-item .ni { font-size: 20px; display: block; transition: transform 0.25s; }
  .nav-item .nl { font-size: 11px; margin-top: 2px; display: block; font-weight: 500; }
  .nav-item.active .ni { transform: scale(1.15); }

  /* ── Main ── */
  main {
    flex: 1;
    padding: 0 24px 24px;
    overflow-y: auto;
  }
  .tab-panel { display: none; animation: fadeSlide 0.3s ease; }
  .tab-panel.active { display: block; }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    transition: all 0.25s;
    border: 1.5px solid transparent;
  }
  .card:hover {
    box-shadow: var(--shadow-hover);
    border-color: rgba(0,0,0,0.04);
    transform: translateY(-1px);
  }
  .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .card-title { font-size:14px; font-weight:650; opacity:0.85; display:flex; align-items:center; gap:7px; }
  .card-title .icon { font-size: 20px; display: inline-block; }

  /* ── KPI grid ── */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 14px;
  }
  .kpi {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 16px;
    box-shadow: var(--shadow);
    text-align: center;
    transition: all 0.25s;
    border: 1.5px solid transparent;
    cursor: default;
  }
  .kpi:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-3px);
  }
  .kpi .kpi-icon { font-size: 28px; display: block; margin-bottom: 4px; }
  .kpi .val { font-size: 32px; font-weight: 700; background: linear-gradient(135deg, var(--peach), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .kpi .lbl { font-size: 11px; color: var(--text2); margin-top: 2px; font-weight: 500; }

  /* ── Mood emoji buttons ── */
  .mood-row { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; }
  .mood-btn {
    font-size: 36px;
    background: none; border: 2.5px solid transparent;
    border-radius: 50%; width: 60px; height: 60px;
    cursor: pointer; transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .mood-btn:hover { transform: scale(1.18); }
  .mood-btn:active { transform: scale(0.9); }
  .mood-btn.selected {
    border-color: var(--accent);
    background: var(--surface);
    animation: pop 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes pop {
    0% { transform: scale(1); }
    40% { transform: scale(1.25); }
    100% { transform: scale(1.1); }
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 9px 18px; border-radius: 22px;
    font-size: 13px; font-weight: 600;
    border: 2px solid var(--accent);
    background: transparent; color: var(--accent);
    cursor: pointer; transition: all 0.2s;
    font-family: var(--font);
  }
  .btn:hover { background: var(--accent); color: #fff; transform: translateY(-1px); box-shadow: 0 3px 12px rgba(232,168,124,0.25); }
  .btn:active { transform: scale(0.95); }
  .btn.fill { background: linear-gradient(135deg, var(--accent), var(--peach)); color: #fff; border-color: transparent; }
  .btn.fill:hover { opacity: 0.9; box-shadow: 0 4px 16px rgba(232,168,124,0.3); }
  .btn.sm { padding: 5px 12px; font-size: 11px; border-radius: 16px; }

  /* ── Tag ── */
  .tag {
    display: inline-block;
    padding: 4px 12px; border-radius: 14px;
    font-size: 11.5px; font-weight: 600;
    background: var(--surface); color: var(--text2);
    margin: 2px; cursor: pointer;
    transition: all 0.2s;
    border: 2px solid transparent;
  }
  .tag:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  .tag.active, .tag:active { border-color: var(--accent); color: var(--accent); background: var(--card); }

  /* ── Goal ── */
  .goal-item { margin-bottom: 12px; }
  .goal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
  .goal-name { font-size:14px; font-weight:600; display:flex; align-items:center; gap:6px; }
  .goal-pct { font-size:13px; color:var(--accent); font-weight:700; }
  .goal-bar-wrap { height:10px; background:var(--surface); border-radius:5px; overflow:hidden; }
  .goal-bar { height:100%; border-radius:5px; transition:width 0.5s cubic-bezier(0.4,0,0.2,1); position:relative; }
  .goal-bar::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 2s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .goal-actions { margin-top:7px; display:flex; gap:5px; flex-wrap:wrap; }

  /* ── Interest tag cloud ── */
  .interest-cloud { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  .interest-tag {
    padding: 7px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    border: 2px solid transparent;
  }
  .interest-tag:hover { transform: scale(1.08); box-shadow: 0 3px 12px rgba(0,0,0,0.08); }

  /* ── Diary entry ── */
  .diary-entry { margin-bottom: 10px; }
  .diary-meta { display:flex; gap:8px; align-items:center; font-size:11px; color:var(--text2); margin-bottom:5px; flex-wrap:wrap; }
  .diary-title { font-size:15px; font-weight:600; margin-bottom:4px; }
  .diary-body { font-size:13px; color:var(--text2); line-height:1.7; white-space:pre-wrap; }
  .diary-tags { margin-top:7px; display:flex; flex-wrap:wrap; gap:3px; }

  /* ── Modal ── */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.35);
    z-index:50; display:none;
    align-items:center; justify-content:center;
    backdrop-filter:blur(3px);
  }
  .modal-overlay.show { display:flex; }
  .modal {
    background:var(--card); border-radius:var(--radius);
    padding:24px 20px 28px;
    width:90%; max-width:480px; max-height:85vh;
    overflow-y:auto;
    box-shadow:0 16px 48px rgba(0,0,0,0.18);
    animation:modalIn 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes modalIn {
    from { opacity:0; transform:translateY(30px) scale(0.95); }
    to { opacity:1; transform:translateY(0) scale(1); }
  }
  .modal h3 { font-size:18px; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .modal input, .modal textarea {
    width:100%; padding:11px 14px; border-radius:var(--radius-sm);
    border:2px solid var(--surface); background:var(--bg);
    color:var(--text); font-family:var(--font); font-size:13px;
    margin-bottom:10px; outline:none; transition:border-color 0.2s;
  }
  .modal input:focus, .modal textarea:focus { border-color:var(--accent); }
  .modal textarea { min-height:90px; resize:vertical; }

  /* ── Chart ── */
  .chart-wrap { position:relative; height:220px; margin:8px 0; }
  .chart-wrap canvas { width:100% !important; }

  /* ── Two column layout ── */
  .col2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .col2-1of3 { display:grid; grid-template-columns:1fr 2fr; gap:14px; }
  .col2-2of3 { display:grid; grid-template-columns:2fr 1fr; gap:14px; }

  /* ── Empty state ── */
  .empty {
    text-align:center; padding:40px 20px;
    color:var(--text3); font-size:13px;
  }
  .empty .big { font-size:52px; display:block; margin-bottom:10px; animation:bounce 2.5s infinite; }

  /* ── Toast ── */
  .toast {
    position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
    background:var(--text); color:var(--bg);
    padding:10px 22px; border-radius:22px;
    font-size:13px; font-weight:600; z-index:100;
    opacity:0; transition:opacity 0.3s; pointer-events:none;
    white-space:nowrap; box-shadow:0 8px 24px rgba(0,0,0,0.15);
  }
  .toast.show { opacity:0.94; }

  /* ── Sparkle decoration ── */
  .sparkle {
    position: absolute; pointer-events: none;
    font-size: 14px; opacity: 0;
    animation: sparkleFloat 1.5s ease-out forwards;
  }
  @keyframes sparkleFloat {
    0% { opacity:1; transform: translate(0,0) scale(0); }
    50% { opacity:1; transform: translate(var(--sx), var(--sy)) scale(1.3); }
    100% { opacity:0; transform: translate(var(--sx), calc(var(--sy) - 20px)) scale(0.5); }
  }

  /* ── Responsive: mobile ── */
  @media (max-width: 768px) {
    header { padding:10px 14px; }
    .logo .mascot { font-size: 26px; }
    .logo h1 { font-size: 16px; }
    nav { margin:0 10px 10px; padding:3px; border-radius:14px; }
    .nav-item { padding:8px 4px; border-radius:10px; }
    .nav-item .ni { font-size: 18px; }
    .nav-item .nl { font-size: 9px; }
    main { padding:0 10px 16px; }
    .kpi-row { grid-template-columns: repeat(2, 1fr); gap:8px; }
    .kpi { padding:14px 10px; }
    .kpi .kpi-icon { font-size: 22px; }
    .kpi .val { font-size: 26px; }
    .col2, .col2-1of3, .col2-2of3 { grid-template-columns:1fr; }
    .card { padding:14px; }
    .mood-btn { font-size:30px; width:48px; height:48px; }
    .modal { width:95%; padding:18px 14px 22px; border-radius:var(--radius) var(--radius) 0 0; animation:slideUp 0.3s ease; }
    @keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
    @keyframes modalIn { from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }
    .chart-wrap { height:180px; }
  }
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">
    <span class="mascot">🐰</span>
    <h1>芦苇海 · 我的记录</h1>
  </div>
  <div class="header-actions">
    <button class="hbtn" id="btn-export" title="💾 导出备份">📦</button>
    <button class="hbtn" id="btn-import" title="📥 导入备份">📥</button>
    <button class="hbtn" id="btn-theme" title="🌓 深浅模式">🌙</button>
  </div>
</header>

<nav>
  <button class="nav-item active" data-tab="overview"><span class="ni">🏠</span><span class="nl">总览</span></button>
  <button class="nav-item" data-tab="diary"><span class="ni">🐰</span><span class="nl">日记</span></button>
  <button class="nav-item" data-tab="mood"><span class="ni">🌈</span><span class="nl">心情</span></button>
  <button class="nav-item" data-tab="goals"><span class="ni">🌟</span><span class="nl">目标</span></button>
  <button class="nav-item" data-tab="interests"><span class="ni">🦊</span><span class="nl">兴趣</span></button>
</nav>

<main id="main">

  <!-- ═══ 总览 ═══ -->
  <div class="tab-panel active" id="tab-overview">
    <div class="kpi-row">
      <div class="kpi"><span class="kpi-icon">🐰</span><div class="val" id="ov-diary">0</div><div class="lbl">日记篇数</div></div>
      <div class="kpi"><span class="kpi-icon">🌈</span><div class="val" id="ov-mood">--</div><div class="lbl">今日心情</div></div>
      <div class="kpi"><span class="kpi-icon">🌟</span><div class="val" id="ov-goals">0</div><div class="lbl">进行中目标</div></div>
      <div class="kpi"><span class="kpi-icon">🦊</span><div class="val" id="ov-interests">0</div><div class="lbl">近期兴趣</div></div>
    </div>

    <div class="col2-2of3">
      <div class="card" id="quick-mood-card">
        <div class="card-title"><span class="icon">🫧</span> 此刻心情</div>
        <div class="mood-row">
          <button class="mood-btn" data-mood="5" data-emoji="🥰">🥰</button>
          <button class="mood-btn" data-mood="4" data-emoji="😊">😊</button>
          <button class="mood-btn" data-mood="3" data-emoji="😗">😗</button>
          <button class="mood-btn" data-mood="2" data-emoji="🥺">🥺</button>
          <button class="mood-btn" data-mood="1" data-emoji="😿">😿</button>
        </div>
      </div>

      <div class="card" id="overview-mood-chart-card">
        <div class="card-title"><span class="icon">📈✨</span> 心情趋势（近7天）</div>
        <div class="chart-wrap"><canvas id="overview-mood-chart"></canvas></div>
      </div>
    </div>

    <div class="col2">
      <div class="card">
        <div class="card-title"><span class="icon">🌟</span> 活跃目标</div>
        <div id="overview-goals"></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="icon">🦊</span> 兴趣热力</div>
        <div class="interest-cloud" id="overview-interests"></div>
      </div>
    </div>
  </div>

  <!-- ═══ 日记 ═══ -->
  <div class="tab-panel" id="tab-diary">
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
      <button class="btn fill" id="btn-add-diary">🐰 写日记</button>
      <button class="btn" id="btn-diary-filter">🏷️ 筛选标签</button>
    </div>
    <div id="diary-filter-tags" style="display:none;margin-bottom:10px;flex-wrap:wrap;gap:4px;"></div>
    <div id="diary-list"></div>
  </div>

  <!-- ═══ 心情 ═══ -->
  <div class="tab-panel" id="tab-mood">
    <div class="col2">
      <div class="card">
        <div class="card-title"><span class="icon">📈✨</span> 心情变化</div>
        <div class="chart-wrap"><canvas id="mood-line-chart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="icon">🍩✨</span> 心情分布</div>
        <div class="chart-wrap"><canvas id="mood-pie-chart" style="max-height:200px;"></canvas></div>
      </div>
    </div>
    <div id="mood-history"></div>
  </div>

  <!-- ═══ 目标 ═══ -->
  <div class="tab-panel" id="tab-goals">
    <button class="btn fill" id="btn-add-goal" style="margin-bottom:14px;">🌟 新建目标</button>
    <div id="goals-list"></div>
  </div>

  <!-- ═══ 兴趣 ═══ -->
  <div class="tab-panel" id="tab-interests">
    <button class="btn fill" id="btn-add-interest" style="margin-bottom:14px;">🦊 记录兴趣</button>
    <div class="col2">
      <div class="card">
        <div class="card-title"><span class="icon">🔥✨</span> 兴趣标签云</div>
        <div class="interest-cloud" id="interests-cloud"></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="icon">📋✨</span> 最近记录</div>
        <div id="interests-log"></div>
      </div>
    </div>
  </div>

</main>

</div><!-- .app -->

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>
<div class="toast" id="toast"></div>
<input type="file" id="import-file" accept=".json" style="display:none">

<script>
// ═══════════════════════════
// DATA
// ═══════════════════════════
const LS = {
  get(k) { try { return JSON.parse(localStorage.getItem('reedsea_'+k)); } catch(e) { return null; } },
  set(k,v) { localStorage.setItem('reedsea_'+k, JSON.stringify(v)); },
};
function loadData() {
  return {
    diary: LS.get('diary')||[], moods: LS.get('moods')||[],
    goals: LS.get('goals')||[], interests: LS.get('interests')||[],
    dark: LS.get('dark')||false,
  };
}
function saveAll(d) {
  ['diary','moods','goals','interests','dark'].forEach(k => LS.set(k, d[k]));
}
let D = loadData();

// ═══════════════════════════
// HELPERS
// ═══════════════════════════
const $=id=>document.getElementById(id);
const today=()=>new Date().toISOString().slice(0,10);
const now=()=>new Date().toISOString();
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML;};
const timeFmt=iso=>{if(!iso)return'';const d=new Date(iso);const pad=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;};

const MOOD_EMOJI={5:'🥰',4:'😊',3:'😗',2:'🥺',1:'😿'};
const MOOD_LABEL={5:'超开心',4:'还不错',3:'普普通通',2:'有点低落',1:'很难过'};
const COLORS=['#f0a5b5','#f5c1a1','#a8d8c8','#c7b3e5','#a3c6e8','#f5e2a9','#e8a87c','#d4a878'];
const INT_COLORS=['#f0a5b5','#f5c1a1','#a8d8c8','#c7b3e5','#a3c6e8','#f5e2a9','#e8a87c','#d4a878'];

// ═══════════════════════════
// TOAST
// ═══════════════════════════
let tid;
function toast(m) {
  const t=$('toast'); t.textContent=m; t.classList.add('show');
  clearTimeout(tid); tid=setTimeout(()=>t.classList.remove('show'),1800);
}

// ═══════════════════════════
// SPARKLE ✨
// ═══════════════════════════
function sparkle(el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const emojis = ['✨','⭐','💫','🌟','💖','🌸'];
  for (let i=0; i<6; i++) {
    const s = document.createElement('span');
    s.className = 'sparkle';
    s.textContent = emojis[i%emojis.length];
    s.style.cssText = `
      left:${cx}px; top:${cy}px;
      --sx:${(Math.random()-0.5)*80}px;
      --sy:${(Math.random()-0.5)*80}px;
      animation-delay:${i*0.08}s;
      font-size:${12+Math.random()*10}px;
    `;
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 1800);
  }
}

function showModal(h) { $('modal-content').innerHTML=h; $('modal-overlay').classList.add('show'); }
function hideModal() { $('modal-overlay').classList.remove('show'); }
$('modal-overlay').addEventListener('click',e=>{if(e.target===$('modal-overlay'))hideModal();});

// TABS
// ═══════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  $('tab-'+name).classList.add('active');
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');
  renderTab(name);
}
document.querySelectorAll('.nav-item').forEach(b=>{
  b.addEventListener('click',()=>switchTab(b.dataset.tab));
});

// THEME
// ═══════════════════════════
function applyTheme() {
  document.body.classList.toggle('dark',D.dark);
  $('btn-theme').textContent = D.dark ? '☀️' : '🌙';
}
$('btn-theme').addEventListener('click',()=>{
  D.dark=!D.dark; applyTheme(); saveAll(D);
  if(document.querySelector('#tab-overview.active')) renderOverview();
  if(document.querySelector('#tab-mood.active')) renderMoodTab();
});

// ═══════════════════════════
// OVERVIEW
// ═══════════════════════════
function renderOverview() {
  $('ov-diary').textContent = D.diary.length;
  const tm = D.moods.filter(m=>m.date===today()).pop();
  $('ov-mood').textContent = tm ? MOOD_EMOJI[tm.value] : '--';
  $('ov-goals').textContent = D.goals.filter(g=>g.progress<100).length;
  const recent = D.interests.filter(i=>i.date>=new Date(Date.now()-14*86400000).toISOString().slice(0,10));
  $('ov-interests').textContent = new Set(recent.map(i=>i.name)).size;
  renderOverviewMoodChart();
  // Goals
  const active = D.goals.filter(g=>g.progress<100);
  const gd = $('overview-goals');
  if(!active.length) {
    gd.innerHTML='<div class="empty"><span class="big">🌟</span>还没有目标<br><button class="btn sm" onclick="switchTab(\'goals\')">去创建 →</button></div>';
  } else {
    gd.innerHTML = active.slice(0,4).map(g=>`
      <div class="goal-item">
        <div class="goal-header"><span class="goal-name">${g.icon||'🌟'} ${esc(g.title)}</span><span class="goal-pct">${g.progress}%</span></div>
        <div class="goal-bar-wrap"><div class="goal-bar" style="width:${g.progress}%;background:${g.color||'var(--accent)'}"></div></div>
      <div style="font-size:10px;color:var(--text3);margin-top:4px;">🕐 ${timeFmt(g.created)}</div>
      </div>
    `).join('');
  }
  renderInterestCloud($('overview-interests'));
}

function renderOverviewMoodChart() {
  const c=$('overview-mood-chart'); const ctx=c.getContext('2d');
  if(c._chart) c._chart.destroy();
  const days=[]; for(let i=6;i>=0;i--) days.push(new Date(Date.now()-i*86400000).toISOString().slice(0,10));
  const data=days.map(d=>{const m=D.moods.filter(x=>x.date===d).pop();return m?m.value:null;});
  const tc=D.dark?'#9a8b78':'#8b7b68';
  const gc=D.dark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)';
  c._chart=new Chart(ctx,{type:'line',data:{labels:days.map(d=>d.slice(5)),datasets:[{data,borderColor:'#e8a87c',backgroundColor:'rgba(240,165,181,0.12)',fill:true,tension:0.4,pointRadius:6,pointBackgroundColor:'#f0a5b5',spanGaps:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0.5,max:5.5,ticks:{stepSize:1,color:tc,callback:v=>MOOD_EMOJI[v]||''},grid:{color:gc}},x:{ticks:{color:tc},grid:{color:gc}}}}});
}

// ═══════════════════════════
// DIARY
// ═══════════════════════════
let diaryFilterTag=null;

function renderDiaryTab() {
  const list=$('diary-list');
  let entries=[...D.diary].sort((a,b)=>b.date.localeCompare(a.date));
  if(diaryFilterTag) entries=entries.filter(e=>e.tags&&e.tags.includes(diaryFilterTag));
  if(!entries.length) {
    list.innerHTML='<div class="empty"><span class="big">🐰</span>还没有日记<br>点击上方按钮开始记录吧 ✨</div>';
  } else {
    list.innerHTML=entries.map(e=>`
      <div class="card diary-entry">
        <div class="diary-meta">
          <span>📅 ${timeFmt(e.created)}</span>
          ${e.mood?`<span>${MOOD_EMOJI[e.mood]} ${MOOD_LABEL[e.mood]}</span>`:''}
          <span style="margin-left:auto;cursor:pointer;opacity:0.4;font-size:13px;" onclick="deleteDiary('${e.id}')" title="删除">🗑️</span>
        </div>
        ${e.title?`<div class="diary-title">${esc(e.title)}</div>`:''}
        <div class="diary-body">${esc(e.content)}</div>
        ${e.tags&&e.tags.length?`<div class="diary-tags">${e.tags.map(t=>`<span class="tag" onclick="filterDiaryByTag('${esc(t)}')">${esc(t)}</span>`).join('')}</div>`:''}
      </div>
    `).join('');
  }
}

function deleteDiary(id) {
  if(!confirm('确定删除这篇日记吗？🐰')) return;
  D.diary=D.diary.filter(e=>e.id!==id); saveAll(D); renderDiaryTab(); toast('已删除 🗑️');
}
function filterDiaryByTag(tag) {
  diaryFilterTag=diaryFilterTag===tag?null:tag;
  $('btn-diary-filter').classList.toggle('fill',!!diaryFilterTag);
  renderDiaryTab();
}
$('btn-diary-filter').addEventListener('click',()=>{
  const allTags=new Set(); D.diary.forEach(e=>(e.tags||[]).forEach(t=>allTags.add(t)));
  const td=$('diary-filter-tags');
  if(td.style.display==='none') {
    td.style.display='flex';
    td.innerHTML=[...allTags].map(t=>`<span class="tag ${diaryFilterTag===t?'active':''}" onclick="filterDiaryByTag('${esc(t)}')">${esc(t)}</span>`).join('')+'<span class="tag" style="opacity:0.5" onclick="diaryFilterTag=null;renderDiaryTab();$(\'diary-filter-tags\').style.display=\'none\'">✕</span>';
  } else { td.style.display='none'; }
});

function showAddDiary() {
  const allTags=new Set(); D.diary.forEach(e=>(e.tags||[]).forEach(t=>allTags.add(t))); D.interests.forEach(i=>allTags.add(i.name));
  showModal(`
    <h3>🐰 写日记</h3>
    <input id="diary-title" placeholder="今天的小标题…">
    <textarea id="diary-content" placeholder="今天发生了什么有趣的事？🐾"></textarea>
    <div style="margin-bottom:8px;">
      <span style="font-size:11px;color:var(--text2);">心情：</span>
      <div class="mood-row" style="justify-content:flex-start;gap:4px;" id="diary-mood-select">
        ${[5,4,3,2,1].map(v=>`<button class="mood-btn" data-mood="${v}" style="font-size:28px;width:44px;height:44px;">${MOOD_EMOJI[v]}</button>`).join('')}
      </div>
    </div>
    <div style="margin-bottom:10px;">
      <span style="font-size:11px;color:var(--text2);">标签：</span>
      <div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;" id="diary-tag-select">
        ${[...allTags].map(t=>`<span class="tag" data-tag="${esc(t)}">${esc(t)}</span>`).join('')}
      </div>
      <input id="diary-new-tag" placeholder="+ 新标签" style="margin-top:6px;padding:7px 10px;font-size:12px;">
    </div>
    <button class="btn fill" onclick="saveDiary()" style="width:100%;justify-content:center;">✨ 保存日记</button>
  `);
  let selMood=null, selTags=[];
  document.querySelectorAll('#diary-mood-select .mood-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('#diary-mood-select .mood-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');selMood=parseInt(b.dataset.mood);});});
  document.querySelectorAll('#diary-tag-select .tag').forEach(t=>{t.addEventListener('click',()=>{const tag=t.dataset.tag;if(selTags.includes(tag))selTags=selTags.filter(x=>x!==tag);else selTags.push(tag);t.classList.toggle('active',selTags.includes(tag));});});
  window._saveDiary=()=>{
    const title=document.getElementById('diary-title')?.value?.trim()||'';
    const content=document.getElementById('diary-content')?.value?.trim()||'';
    if(!content){toast('写点什么吧 🐰');return;}
    const nt=document.getElementById('diary-new-tag')?.value?.trim();
    if(nt&&!selTags.includes(nt))selTags.push(nt);
    D.diary.push({id:uid(),date:today(),title,content,mood:selMood,tags:selTags,created:now()});
    saveAll(D); hideModal(); renderDiaryTab(); renderOverview();
    toast('日记已保存 ✨'); sparkle($('btn-add-diary'));
  };
}
window.saveDiary=()=>window._saveDiary?.();
$('btn-add-diary').addEventListener('click',showAddDiary);

// MOOD TAB
// ═══════════════════════════
function renderMoodTab(){renderMoodLineChart();renderMoodPieChart();renderMoodHistory();}

function renderMoodLineChart(){
  const c=$('mood-line-chart'); const ctx=c.getContext('2d'); if(c._chart)c._chart.destroy();
  const moods=[...D.moods].sort((a,b)=>a.date.localeCompare(b.date));
  if(!moods.length)return;
  const tc=D.dark?'#9a8b78':'#8b7b68', gc=D.dark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)';
  c._chart=new Chart(ctx,{type:'line',data:{labels:moods.map(m=>m.date.slice(5)),datasets:[{data:moods.map(m=>m.value),borderColor:'#e8a87c',backgroundColor:'rgba(240,165,181,0.12)',fill:true,tension:0.35,pointRadius:5,pointBackgroundColor:'#f0a5b5'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0.5,max:5.5,ticks:{stepSize:1,color:tc,callback:v=>MOOD_EMOJI[v]||''},grid:{color:gc}},x:{ticks:{color:tc,maxTicksLimit:14},grid:{color:gc}}}}});
}

function renderMoodPieChart(){
  const c=$('mood-pie-chart'); const ctx=c.getContext('2d'); if(c._chart)c._chart.destroy();
  const counts={5:0,4:0,3:0,2:0,1:0}; D.moods.forEach(m=>counts[m.value]++);
  const labels=Object.entries(counts).filter(([,c])=>c>0).map(([v])=>MOOD_EMOJI[v]+' '+MOOD_LABEL[v]);
  const data=Object.entries(counts).filter(([,c])=>c>0).map(([,c])=>c);
  if(!data.length)return;
  c._chart=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:['#f0a5b5','#f5c1a1','#f5e2a9','#a3c6e8','#c7b3e5'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:D.dark?'#9a8b78':'#8b7b68',font:{size:11},padding:14}}}}});
}

function renderMoodHistory(){
  const div=$('mood-history');
  const recent=[...D.moods].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20);
  if(!recent.length){div.innerHTML='<div class="empty"><span class="big">🌈</span>还没有心情记录<br>去总览页点一下心情吧~</div>';return;}
  div.innerHTML='<div class="card"><div class="card-title"><span class="icon">📋✨</span> 心情记录</div>'+recent.map(m=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--surface);"><span style="font-size:26px;">${MOOD_EMOJI[m.value]}</span><span style="flex:1;font-size:12px;">${timeFmt(m.created)}</span><span style="font-size:11px;color:var(--text2);">${MOOD_LABEL[m.value]}</span></div>`).join('')+'</div>';
}

// ═══════════════════════════
// GOALS
// ═══════════════════════════
function renderGoalsTab(){
  const list=$('goals-list');
  if(!D.goals.length){list.innerHTML='<div class="empty"><span class="big">🌟</span>还没有目标<br>设定你的小目标吧~</div>';return;}
  list.innerHTML=D.goals.map(g=>`
    <div class="card goal-item">
      <div class="goal-header">
        <span class="goal-name">${g.icon||'🌟'} ${esc(g.title)}</span>
        <span class="goal-pct">${g.progress}%</span>
        <span style="cursor:pointer;opacity:0.35;font-size:13px;margin-left:4px;" onclick="deleteGoal('${g.id}')" title="删除">🗑️</span>
      </div>
      <div class="goal-bar-wrap"><div class="goal-bar" style="width:${g.progress}%;background:${g.color||'var(--accent)'}"></div></div>
      <div style="font-size:10px;color:var(--text3);margin-top:4px;">🕐 ${timeFmt(g.created)}</div>
      <div class="goal-actions">
        <button class="btn sm" onclick="updateGoal('${g.id}',-5)">−5</button>
        <button class="btn sm" onclick="updateGoal('${g.id}',-1)">−1</button>
        <button class="btn sm" onclick="updateGoal('${g.id}',1)">+1</button>
        <button class="btn sm" onclick="updateGoal('${g.id}',5)">+5</button>
        <button class="btn sm" onclick="updateGoal('${g.id}',10)">+10</button>
      </div>
    </div>
  `).join('');
}

function updateGoal(id,delta){
  const g=D.goals.find(x=>x.id===id); if(!g)return;
  g.progress=Math.max(0,Math.min(100,g.progress+delta));
  if(g.progress===100){toast('🎉 目标达成！太棒了！');sparkle(document.querySelector(`[onclick*="${id}"]`)||$('goals-list'));}
  saveAll(D); renderGoalsTab(); renderOverview();
}
function deleteGoal(id){if(!confirm('删除这个目标？'))return;D.goals=D.goals.filter(g=>g.id!==id);saveAll(D);renderGoalsTab();renderOverview();toast('已删除');}

function showAddGoal(){
  showModal(`<h3>🌟 新建目标</h3><input id="goal-title" placeholder="目标名称"><div style="display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;" id="goal-icon-select">${['🌟','📚','💪','🏃','💰','✍️','🎨','🎵','🧘','💻','🌱','🏠','🐱','🍳','✈️','🎮'].map(icon=>`<span class="tag" data-icon="${icon}" style="font-size:20px;padding:6px 10px;">${icon}</span>`).join('')}</div><button class="btn fill" onclick="saveGoal()" style="width:100%;justify-content:center;">✨ 创建目标</button>`);
  let selIcon='🌟';
  document.querySelectorAll('#goal-icon-select .tag').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('#goal-icon-select .tag').forEach(x=>x.classList.remove('active'));t.classList.add('active');selIcon=t.dataset.icon;});});
  window._saveGoal=()=>{const title=document.getElementById('goal-title')?.value?.trim();if(!title){toast('输入目标名称 🌟');return;}D.goals.push({id:uid(),title,icon:selIcon,progress:0,color:COLORS[D.goals.length%COLORS.length],created:now()});saveAll(D);hideModal();renderGoalsTab();renderOverview();toast('目标已创建 ✨');sparkle($('btn-add-goal'));};
}
window.saveGoal=()=>window._saveGoal?.();
$('btn-add-goal').addEventListener('click',showAddGoal);

// ═══════════════════════════
// INTERESTS
// ═══════════════════════════
function renderInterestCloud(container){
  const all=D.interests; const counts={}; all.forEach(i=>{counts[i.name]=(counts[i.name]||0)+1;});
  const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  if(!entries.length){container.innerHTML='<div class="empty"><span class="big">🦊</span>还没有兴趣记录</div>';return;}
  const max=entries[0][1];
  container.innerHTML=entries.map(([name,count],idx)=>{const size=0.8+(count/max)*1.4;const color=INT_COLORS[idx%INT_COLORS.length];return`<span class="interest-tag" style="font-size:${(12*size).toFixed(0)}px;background:${color}22;color:${color};border-color:${color}50;" onclick="addInterestNote('${esc(name)}')">${esc(name)}<sup style="font-size:9px;opacity:0.6;margin-left:2px;">${count}</sup></span>`;}).join('');
}

function renderInterestsTab(){
  renderInterestCloud($('interests-cloud'));
  const log=$('interests-log');
  const recent=[...D.interests].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20);
  if(!recent.length){log.innerHTML='<div class="empty">还没有记录~</div>';return;}
  log.innerHTML=recent.map(i=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--surface);"><span style="font-size:20px;">${i.icon||'🦊'}</span><span style="flex:1;font-size:12px;font-weight:600;">${esc(i.name)}</span><span style="font-size:10px;color:var(--text2);">${timeFmt(i.created)}</span><span style="font-size:10px;">${'⭐'.repeat(i.level||1)}</span><span style="cursor:pointer;opacity:0.25;font-size:12px;" onclick="deleteInterest('${i.id}')">✕</span></div>`).join('');
}
function deleteInterest(id){D.interests=D.interests.filter(i=>i.id!==id);saveAll(D);renderInterestsTab();renderOverview();}

function addInterestNote(name){
  showModal(`<h3>🦊 ${esc(name)}</h3><textarea id="interest-note" placeholder="关于这个兴趣的想法…"></textarea><div style="margin-bottom:8px;"><span style="font-size:11px;color:var(--text2);">热衷程度：</span><div style="display:flex;gap:4px;" id="interest-level">${[1,2,3,4,5].map(l=>`<span class="tag" data-level="${l}">${'⭐'.repeat(l)}</span>`).join('')}</div></div><button class="btn fill" onclick="saveInterestNote('${esc(name)}')" style="width:100%;justify-content:center;">✨ 记录</button>`);
  let selLevel=3;
  document.querySelectorAll('#interest-level .tag').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('#interest-level .tag').forEach(x=>x.classList.remove('active'));t.classList.add('active');selLevel=parseInt(t.dataset.level);});});
  document.querySelector('#interest-level .tag[data-level="3"]')?.classList.add('active');
  window._saveInterestNote=(name)=>{const note=document.getElementById('interest-note')?.value?.trim()||'';D.interests.push({id:uid(),name,level:selLevel,note,date:today(),icon:['','🦊','📖','🎯','🔥','💡'][selLevel]||'🦊',created:now()});saveAll(D);hideModal();renderInterestsTab();renderOverview();toast('兴趣已记录 ✨');};
}
window.saveInterestNote=(name)=>window._saveInterestNote?.(name);

function showAddInterest(){
  showModal(`<h3>🦊 记录兴趣</h3><input id="interest-name" placeholder="兴趣/话题名称"><textarea id="interest-note-new" placeholder="为什么对这个感兴趣？最近在做什么？"></textarea><div style="margin-bottom:8px;"><span style="font-size:11px;color:var(--text2);">热衷程度：</span><div style="display:flex;gap:4px;" id="interest-level-new">${[1,2,3,4,5].map(l=>`<span class="tag" data-level="${l}">${'⭐'.repeat(l)}</span>`).join('')}</div></div><button class="btn fill" onclick="saveNewInterest()" style="width:100%;justify-content:center;">✨ 记录</button>`);
  let selLevel=3;
  document.querySelectorAll('#interest-level-new .tag').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('#interest-level-new .tag').forEach(x=>x.classList.remove('active'));t.classList.add('active');selLevel=parseInt(t.dataset.level);});});
  window._saveNewInterest=()=>{const name=document.getElementById('interest-name')?.value?.trim();if(!name){toast('输入兴趣名称 🦊');return;}const note=document.getElementById('interest-note-new')?.value?.trim()||'';D.interests.push({id:uid(),name,level:selLevel,note,date:today(),icon:['','🦊','📖','🎯','🔥','💡'][selLevel]||'🦊',created:now()});saveAll(D);hideModal();renderInterestsTab();renderOverview();toast('兴趣已记录 ✨');sparkle($('btn-add-interest'));};
}
window.saveNewInterest=()=>window._saveNewInterest?.();
$('btn-add-interest').addEventListener('click',showAddInterest);

// ═══════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════
$('btn-export').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=`芦苇海_备份_${today()}.json`; a.click();
  URL.revokeObjectURL(url); toast('📦 备份已下载');
});
$('btn-import').addEventListener('click',()=>$('import-file').click());
$('import-file').addEventListener('change',e=>{
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(!data.diary&&!data.moods&&!data.goals&&!data.interests){toast('⚠️ 无效备份文件');return;}if(!confirm('导入将覆盖现有数据，确定吗？'))return;D.diary=data.diary||[];D.moods=data.moods||[];D.goals=data.goals||[];D.interests=data.interests||[];saveAll(D);renderAll();toast('✅ 数据已恢复');}catch(err){toast('⚠️ 文件格式错误');}};
  reader.readAsText(file);
});

// ═══════════════════════════
// RENDER ALL
// ═══════════════════════════
function renderTab(n){switch(n){case'overview':renderOverview();break;case'diary':renderDiaryTab();break;case'mood':renderMoodTab();break;case'goals':renderGoalsTab();break;case'interests':renderInterestsTab();break;}}
function renderAll(){renderOverview();renderDiaryTab();renderMoodTab();renderGoalsTab();renderInterestsTab();}

// ═══════════════════════════
// INIT
// ═══════════════════════════
applyTheme();
const tm=D.moods.filter(m=>m.date===today()).pop();
if(tm){document.querySelectorAll('#quick-mood-card .mood-btn').forEach(b=>{if(parseInt(b.dataset.mood)===tm.value)b.classList.add('selected');});}
renderOverview();
console.log('🐰 芦苇海 · 我的记录 ✨');
console.log('  🐰 日记 | 🌈 心情 | 🌟 目标 | 🦊 兴趣');
</script>
</body>
